<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Приглашение на свадьбу</title>
    <style>
        /* Основные настройки */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(145deg, #fdfaf6 0%, #f7f1e6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        /* Конверт-контейнер */
        .invitation-card {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            position: relative;
            z-index: 2;
            transition: transform 0.3s ease;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .invitation-card:hover {
            transform: scale(1.01);
        }

        /* Верхняя декоративная секция */
        .hero-section {
            background: linear-gradient(135deg, #d4a5a5 0%, #b77b7b 100%);
            text-align: center;
            padding: 2rem 1rem;
            color: white;
        }

        .hero-section h1 {
            font-size: 2rem;
            letter-spacing: 4px;
            font-weight: 300;
            margin-bottom: 0.5rem;
        }

        .hero-section h2 {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.9;
            border-top: 1px solid rgba(255,255,255,0.3);
            display: inline-block;
            padding-top: 0.5rem;
        }

        /* Основной контент */
        .content {
            padding: 2rem 1.8rem;
            text-align: center;
        }

        .names {
            font-size: 2.2rem;
            font-weight: bold;
            color: #b16262;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        .invite-text {
            color: #5a4a42;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 2rem;
            font-style: italic;
        }

        /* Дата и место */
        .details {
            background: #fbf8f3;
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px dashed #e2cfb3;
        }

        .date {
            font-size: 1.8rem;
            font-weight: bold;
            color: #8b5a2b;
            margin: 0.5rem 0;
        }

        .time, .location {
            font-size: 1rem;
            color: #7e6b5e;
            margin: 0.3rem 0;
        }

        .location {
            font-weight: 600;
            color: #b16262;
        }

        /* Кнопка подтверждения */
        .rsvp-btn {
            background: #d4a5a5;
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1rem;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .rsvp-btn:hover {
            background: #b77b7b;
        }

        /* Красивые цитаты */
        .footer-quote {
            font-size: 0.75rem;
            color: #b2a287;
            margin-top: 1rem;
            border-top: 1px solid #efebe5;
            padding-top: 1.5rem;
        }

        /* Анимация падающих лепестков (Чистый CSS) */
        .petals {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            top: -10%;
            color: #ffb7b7;
            font-size: 1.5rem;
            user-select: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<!-- Слой с анимацией (Лепестки роз) -->
<div class="petals" id="petals"></div>

<!-- Основная карточка -->
<div class="invitation-card">
    <div class="hero-section">
        <h1>WEDDING</h1>
        <h2>Приглашение</h2>
    </div>
    <div class="content">
        <!-- Впишите ВАШИ имена здесь -->
        <div class="names">
            Александр & Ангелина
        </div>
        <div class="invite-text">
            Искренне рады пригласить вас<br>
            разделить с нами радость этого особенного дня!
        </div>
        
        <div class="details">
            <div>🎀 Торжество состоится 🎀</div>
            <!-- Впишите ВАШУ дату и время здесь -->
            <div class="date">17 Июля 2026</div>
            <div class="time">Сбор гостей в 16:00</div>
            <div class="location">🌿 Деревня Пешково 🌿</div>
        </div>

        <!-- Кнопка с ссылкой на WhatsApp (Вставьте свой номер телефона) -->
        <a href="https://wa.me/+79258389280?text=Я%20буду%20на%20вашей%20свадьбе!" target="_blank" style="text-decoration: none;">
            <button class="rsvp-btn">
                📱 ПОДТВЕРДИТЬ ПРИСУТСТВИЕ (WhatsApp)
            </button>
        </a>
        <div class="footer-quote">
            "Любовь не ищет своего, но всё покрывает, всему верит, всего надеется, всё переносит."
        </div>
    </div>
</div>

<script>
    // Генерация лепестков JavaScript
    function createPetal() {
        const petalContainer = document.getElementById('petals');
        const petal = document.createElement('div');
        petal.classList.add('petal');
        
        // Варианты символов лепестков
        const petalsArray = ['🌸', '🌹', '🌺', '🌸', '🌸'];
        petal.innerHTML = petalsArray[Math.floor(Math.random() * petalsArray.length)];
        
        // Случайные размеры
        const size = Math.random() * 20 + 15; // от 15 до 35px
        petal.style.fontSize = size + 'px';
        
        // Случайная позиция по горизонтали
        petal.style.left = Math.random() * 100 + '%';
        
        // Случайная длительность анимации (от 5 до 12 секунд)
        const duration = Math.random() * 7 + 5;
        petal.style.animationDuration = duration + 's';
        
        // Случайная задержка старта
        petal.style.animationDelay = Math.random() * 5 + 's';
        
        petalContainer.appendChild(petal);
        
        // Удаляем лепесток после окончания анимации, чтобы не засорять DOM
        setTimeout(() => {
            petal.remove();
        }, duration * 1000);
    }

    // Создаем лепестки с интервалом
    setInterval(createPetal, 400);
    
    // Сразу создаем 10 лепестков при загрузке страницы для пышности
    for(let i = 0; i < 15; i++) {
        setTimeout(createPetal, i * 100);
    }
</script>
</body>
</html>
